name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          ORIZ_FLEET_GOOGLE_ANALYTICS_MEASUREMENT_ID: ${{ secrets.ORIZ_FLEET_GOOGLE_ANALYTICS_MEASUREMENT_ID }}
          ORIZ_FLEET_MICROSOFT_CLARITY_PROJECT_ID: ${{ secrets.ORIZ_FLEET_MICROSOFT_CLARITY_PROJECT_ID }}
          ORIZ_FLEET_POSTHOG_PROJECT_API_KEY: ${{ secrets.ORIZ_FLEET_POSTHOG_PROJECT_API_KEY }}
          ORIZ_FLEET_POSTHOG_API_HOST: ${{ secrets.ORIZ_FLEET_POSTHOG_API_HOST }}
          ORIZ_FLEET_SENTRY_DSN_BROWSER_SDK: ${{ secrets.ORIZ_FLEET_SENTRY_DSN_BROWSER_SDK }}
          ORIZ_FLEET_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ secrets.ORIZ_FLEET_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler@4 pages project create fleet-landing --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler@4 pages deploy dist --project-name=fleet-landing --branch=main
